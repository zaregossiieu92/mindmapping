<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mind Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
    overflow: hidden;
  }

  #canvas {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  .node {
    position: absolute;
    padding: 10px 14px;
    background: #1e293b;
    border: 2px solid #38bdf8;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
  }

  .node:hover {
    background: #334155;
    transform: scale(1.05);
  }

  svg {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  line {
    stroke: #38bdf8;
    stroke-width: 2;
  }
</style>
</head>

<body>

<div id="canvas">
  <svg id="lines"></svg>
</div>

<script>
const data = {
  text: "Main Idea",
  children: [
    {
      text: "Branch 1",
      children: [
        { text: "Sub 1" },
        { text: "Sub 2" }
      ]
    },
    {
      text: "Branch 2",
      children: [
        { text: "Sub A" },
        { text: "Sub B" }
      ]
    },
    {
      text: "Branch 3",
      children: [
        { text: "Sub X" }
      ]
    }
  ]
};

const canvas = document.getElementById("canvas");
const svg = document.getElementById("lines");

function createNode(text, x, y) {
  const el = document.createElement("div");
  el.className = "node";
  el.innerText = text;
  el.style.left = x + "px";
  el.style.top = y + "px";
  canvas.appendChild(el);
  return el;
}

function connect(a, b) {
  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

  const rectA = a.getBoundingClientRect();
  const rectB = b.getBoundingClientRect();

  line.setAttribute("x1", rectA.left + rectA.width / 2);
  line.setAttribute("y1", rectA.top + rectA.height / 2);
  line.setAttribute("x2", rectB.left + rectB.width / 2);
  line.setAttribute("y2", rectB.top + rectB.height / 2);

  svg.appendChild(line);
}

function renderTree(node, x, y, spread = 120) {
  const root = createNode(node.text, x, y);

  if (!node.children) return root;

  const startY = y - (node.children.length - 1) * spread / 2;

  node.children.forEach((child, i) => {
    const childNode = renderTree(
      child,
      x + 200,
      startY + i * spread,
      spread * 0.8
    );
    setTimeout(() => connect(root, childNode), 50);
  });

  return root;
}

renderTree(data, 100, window.innerHeight / 2);
</script>

</body>
</html>
